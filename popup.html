<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%; height: 100%;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        color: white;
        overflow: hidden;
    }
    .container {
        background: rgba(30, 30, 32, 0.92);
        border-radius: 10px;
        padding: 14px 16px;
        height: 100%;
        backdrop-filter: blur(20px);
    }
    .list-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 6px;
        font-weight: 500;
    }
    .list-label .icon { margin-right: 4px; }
    input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: white;
        font-size: 18px;
        font-weight: 400;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.35); }
</style>
</head>
<body>
<div class="container">
    <div class="list-label"><span class="icon">📋</span><span id="list-name">Work</span></div>
    <input type="text" id="input" placeholder="할 일... (@내일 3pm)" autofocus>
</div>
<script>
    const input = document.getElementById('input');
    const listName = document.getElementById('list-name');

    function send(action, payload) {
        const msg = JSON.stringify({ action: action, payload: payload || {} });
        window.location.href = 'hsmsg://' + encodeURIComponent(msg);
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            send('submit', { text: input.value });
        } else if (e.key === 'Escape') {
            e.preventDefault();
            send('cancel');
        } else if (e.key === 'Tab') {
            e.preventDefault();
            send(e.shiftKey ? 'prev-list' : 'next-list');
        }
    });

    window.setListName = function(name) {
        listName.textContent = name;
    };

    window.addEventListener('load', () => input.focus());
</script>
</body>
</html>
