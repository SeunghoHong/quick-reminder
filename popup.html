<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%; height: 100%;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        color: white;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }
    .container {
        background: rgba(22, 22, 26, 0.82);
        border: 2.0px solid white;
        border-radius: 24px;
        padding: 16px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
    }
    .list-label {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.72);
        margin-bottom: 10px;
        font-weight: 700;
        letter-spacing: 0.2px;
    }
    .list-label .icon { margin-right: 6px; }
    input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: rgba(255, 255, 255, 0.98);
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.3px;
        caret-color: rgba(120, 180, 255, 0.95);
    }
    input::placeholder {
        color: rgba(255, 255, 255, 0.3);
        font-weight: 500;
    }
</style>
</head>
<body>
<div class="container">
    <div class="list-label"><span class="icon">📋</span><span id="list-name">Work</span></div>
    <input type="text" id="input" placeholder="TODO @today 3pm" autofocus>
</div>
<script>
    const input = document.getElementById('input');
    const listName = document.getElementById('list-name');

    window.setListName = function(name) {
        listName.textContent = name;
    };

    window.addEventListener('load', () => input.focus());
</script>
</body>
</html>
